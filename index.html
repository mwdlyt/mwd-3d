<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MWD — THREE DIMENSIONAL INTERFACES</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #000;
    color: #fff;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  canvas#webgl {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    display: block;
  }

  .scroll-container {
    position: relative;
    z-index: 2;
    pointer-events: none;
  }

  .section {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
  }

  .section-content {
    text-align: center;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .section-content.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .hero-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 900;
    font-size: clamp(5rem, 15vw, 14rem);
    letter-spacing: -0.04em;
    line-height: 0.85;
    color: #fff;
    text-shadow: 0 0 80px rgba(0, 255, 209, 0.25);
  }

  .hero-sub {
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    font-size: clamp(0.6rem, 1.3vw, 1rem);
    letter-spacing: 0.4em;
    color: #00FFD1;
    margin-top: 1.5rem;
    opacity: 0.8;
  }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: rgba(255, 255, 255, 0.3);
    margin-bottom: 0.8rem;
    text-transform: uppercase;
  }

  .section-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 900;
    font-size: clamp(2.5rem, 7vw, 5.5rem);
    letter-spacing: -0.02em;
    line-height: 1;
    color: #fff;
    text-shadow: 0 0 50px rgba(124, 58, 237, 0.35);
  }

  .end-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 900;
    font-size: clamp(2rem, 5vw, 4rem);
    letter-spacing: -0.04em;
    line-height: 0.95;
    color: #fff;
    text-shadow: 0 0 60px rgba(124, 58, 237, 0.3);
  }

  .end-sub {
    font-family: 'Space Mono', monospace;
    font-size: clamp(0.6rem, 1vw, 0.85rem);
    letter-spacing: 0.45em;
    color: rgba(255, 255, 255, 0.25);
    margin-top: 1.2rem;
  }

  .scroll-hint {
    position: fixed;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: rgba(255, 255, 255, 0.2);
    text-transform: uppercase;
    animation: hintPulse 2.5s ease-in-out infinite;
    pointer-events: none;
    transition: opacity 0.5s;
  }

  .scroll-hint.hidden { opacity: 0; }

  @keyframes hintPulse {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.5; }
  }

  @media (max-width: 640px) {
    .hero-title { font-size: 22vw; }
  }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<canvas id="webgl"></canvas>

<div class="scroll-container">
  <div class="section" id="section-hero">
    <div class="section-content" id="hero-content">
      <div class="hero-title">MWD</div>
      <div class="hero-sub">THREE DIMENSIONAL INTERFACES</div>
    </div>
  </div>

  <div class="section" id="section-particles">
    <div class="section-content" id="particles-content">
      <div class="section-label">002 / Systems</div>
      <div class="section-title">PARTICLE<br>SYSTEMS</div>
    </div>
  </div>

  <div class="section" id="section-glass">
    <div class="section-content" id="glass-content">
      <div class="section-label">003 / Materials</div>
      <div class="section-title">MATERIAL<br>STUDIES</div>
    </div>
  </div>

  <div class="section" id="section-space">
    <div class="section-content" id="space-content">
      <div class="end-title">MWD — STILL EXPERIMENTING<br>IN THREE DIMENSIONS</div>
      <div class="end-sub">this experience is a work in progress</div>
    </div>
  </div>
</div>

<div class="scroll-hint" id="scroll-hint">Scroll to explore</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script type="module" src="js/scene.js"></script>
</body>
</html>
